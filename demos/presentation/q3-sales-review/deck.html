<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Sales Review Deck Demo</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #16a34a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .wrap {
            max-width: 1080px;
            margin: 0 auto;
            padding: 16px;
        }

        .label {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border) 65%);
            background: color-mix(in srgb, var(--accent) 10%, white 90%);
            color: #14532d;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .deck-frame {
            width: 100%;
            min-height: 72vh;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            box-shadow: 0 8px 28px rgba(17, 24, 39, 0.08);
            overflow: hidden;
        }

        .deck-placeholder {
            min-height: 72vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 24px;
        }

        .deck-placeholder h1 {
            margin: 0 0 8px;
            font-size: clamp(22px, 3.5vw, 34px);
            line-height: 1.2;
        }

        .deck-placeholder p {
            margin: 0;
            color: var(--muted);
            font-size: clamp(14px, 2.2vw, 17px);
        }

        @media (max-width: 640px) {
            .wrap {
                padding: 12px;
            }

            .deck-frame,
            .deck-placeholder {
                min-height: 64vh;
            }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <p class="label">Generated from Clickt Presentation export</p>
        <section class="deck-frame" aria-label="Presentation preview">
            <div class="deck-placeholder">
                <div>
                    <h1>Q3 Sales Review Deck</h1>
                    <p>Presentation HTML export placeholder. Replace with real exported deck content.</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
